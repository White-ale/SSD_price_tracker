name: Price check watchdog

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: price-watchdog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          if [ -z "$TURSO_DATABASE_URL" ] || [ -z "$TURSO_AUTH_TOKEN" ]; then
            echo "::error::Set TURSO_DATABASE_URL and TURSO_AUTH_TOKEN in repository Actions secrets."
            exit 1
          fi
          if [[ "$TURSO_DATABASE_URL" == TURSO_DATABASE_URL=* ]]; then
            echo "::error::TURSO_DATABASE_URL secret must be the URL only, without 'TURSO_DATABASE_URL='."
            exit 1
          fi
          if [[ "$TURSO_DATABASE_URL" != libsql://* ]]; then
            echo "::error::TURSO_DATABASE_URL secret must start with libsql://."
            exit 1
          fi
          if [[ "$TURSO_AUTH_TOKEN" == TURSO_AUTH_TOKEN=* ]]; then
            echo "::error::TURSO_AUTH_TOKEN secret must be the token only, without 'TURSO_AUTH_TOKEN='."
            exit 1
          fi
          if [[ "$TURSO_AUTH_TOKEN" == *$'\n'* || "$TURSO_AUTH_TOKEN" == *$'\r'* ]]; then
            echo "::error::TURSO_AUTH_TOKEN secret must be one line with no line breaks."
            exit 1
          fi

      - name: Run watchdog
        env:
          DATABASE_BACKEND: turso
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHECK_RUN_SOURCE: github-actions-watchdog
        run: python main.py --watchdog
